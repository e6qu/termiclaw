repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, chore, refactor, test, ci, perf, build, style]

  - repo: local
    hooks:
      - id: check-branch
        name: check branch (not main, rebased)
        entry: scripts/check-branch.sh
        language: script
        always_run: true
        pass_filenames: false

      - id: ty-check
        name: ty type check
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false

      - id: no-object-signatures
        name: forbid object/Any in public signatures
        entry: scripts/check-no-object-in-signatures.sh
        language: script
        types: [python]
        pass_filenames: false

      - id: no-monkeypatch
        name: forbid pytest monkeypatch usage
        entry: scripts/check-no-monkeypatch.sh
        language: script
        always_run: true
        pass_filenames: false

      - id: exhaustive-match
        name: forbid `case _:` in decide/shell
        entry: scripts/check-exhaustive-match.sh
        language: script
        always_run: true
        pass_filenames: false

      - id: no-reserved-logrecord-keys
        name: forbid LogRecord-reserved keys in log extra= dicts
        entry: scripts/check-log-reserved-names.sh
        language: script
        always_run: true
        pass_filenames: false

      - id: no-shlex-quote-in-argv
        name: forbid shlex.quote in subprocess argv list mode
        entry: scripts/check-no-shlex-quote-in-argv.sh
        language: script
        always_run: true
        pass_filenames: false

      - id: pytest-unit
        name: unit tests
        entry: uv run pytest tests/unit/ -q --cov=termiclaw --cov-branch --cov-fail-under=84
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-integration
        name: integration tests
        entry: uv run pytest tests/integration/ -q -m integration --cov=termiclaw.tmux --cov-branch --cov-fail-under=50
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      - id: update-loc-badges
        name: update LOC badges
        entry: scripts/update-loc-badges.sh
        language: script
        always_run: true
        pass_filenames: false
        stages: [pre-push]
