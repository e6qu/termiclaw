name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: uv sync --all-groups

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

      - name: ty check
        run: uv run ty check

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: uv sync --all-groups

      - name: Unit tests
        run: uv run pytest tests/unit/ -v --cov=termiclaw --cov-report=term-missing --cov-branch --cov-fail-under=84

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install tmux
        run: sudo apt-get install -y tmux

      - run: uv sync --all-groups

      - name: Integration tests
        run: uv run pytest tests/integration/ -v -m integration --cov=termiclaw.tmux --cov-report=term-missing --cov-branch --cov-fail-under=50
