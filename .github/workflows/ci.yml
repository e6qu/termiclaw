name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check conventional commits
        uses: webiny/action-conventional-commits@v1.3.1
        with:
          allowed-commit-types: "feat,fix,docs,chore,refactor,test,ci,perf,build,style"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: uv sync --all-groups

      # Single source of truth: every lint rule is defined in
      # `.pre-commit-config.yaml`, so CI runs exactly what devs run
      # locally. SKIP covers pre-push-stage hooks (pytest, LOC
      # badges) which have dedicated CI jobs below, plus the
      # check-branch hook which is only meaningful in a local
      # working copy.
      - name: pre-commit
        env:
          SKIP: check-branch,pytest-unit,pytest-integration,update-loc-badges
        run: uv run pre-commit run --all-files --show-diff-on-failure

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: uv sync --all-groups

      - name: Unit tests
        run: uv run pytest tests/unit/ -v --cov=termiclaw --cov-report=term-missing --cov-branch --cov-fail-under=84

  docker-integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: docker info
      - run: uv sync --all-groups

      - name: Container integration tests
        run: uv run pytest tests/integration/ -v -m docker --cov=termiclaw.container --cov-report=term-missing --cov-branch --cov-fail-under=50
